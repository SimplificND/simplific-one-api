services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: ${APP_NAME:-Simplific ONE API}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_WABA_ID: ${META_WABA_ID:-}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-change-me}
      DATABASE_URL: ${DATABASE_URL:-}
      STORAGE_DIR: ${STORAGE_DIR:-/app/storage}
    volumes:
      - one_api_storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-}
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped

volumes:
  one_api_storage:
